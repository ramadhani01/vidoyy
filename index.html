<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidoy Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        /* ========== HEADER ========== */
        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            font-family: 'Rubik Mono One', sans-serif;
            font-size: 28px;
            color: #f59b00;
            line-height: 1;
        }
        .logo small {
            font-family: Arial, sans-serif;
            font-size: 10px;
            letter-spacing: 4px;
            color: #555;
            font-weight: normal;
            display: block;
            margin-top: 2px;
        }

        .total {
            color: #555;
            font-size: 14px;
        }
        .total span {
            color: #f59b00;
            font-weight: bold;
        }

        /* ========== GRID ========== */
        .video-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 18px;
        }

        /* ========== CARD ========== */
        .video-card {
            background: #141414;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #1f1f1f;
            text-decoration: none;
            display: block;
            color: white; /* ← Link warna putih */
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: #f59b00;
            box-shadow: 0 8px 25px rgba(245, 155, 0, 0.12);
        }

        .video-card:active {
            transform: scale(0.96);
        }

        /* ========== THUMBNAIL ========== */
        .video-card .thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #0a0a0a;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-card .thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: 0.4s;
            background: #0a0a0a;
        }

        .video-card:hover .thumb img {
            transform: scale(1.02);
        }

        .video-card .thumb .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        .video-card:hover .thumb .play-icon {
            opacity: 1;
        }

        /* ========== INFO ========== */
        .video-card .info {
            padding: 12px 14px;
        }

        .video-card .info h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white; /* ← Judul putih */
        }

        /* ========== FOOTER ========== */
        .footer {
            max-width: 1200px;
            margin: 30px auto 0;
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid #1a1a1a;
            color: #333;
            font-size: 13px;
        }
        .footer i {
            color: #ef4444;
        }
        .footer a {
            color: white;
            text-decoration: none;
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #444;
        }
        .empty-state i {
            font-size: 50px;
            color: #1a1a1a;
            display: block;
            margin-bottom: 15px;
        }
        .empty-state h2 {
            color: #f59b00;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 14px;
            line-height: 1.6;
        }
        .empty-state strong {
            color: #f59b00;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            .logo { font-size: 22px; }
            .video-card .thumb .play-icon { font-size: 36px; }
        }

        @media (max-width: 400px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
            }
            .video-card .info { padding: 8px 10px; }
            .video-card .info h3 { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            Vidoy
            <small>S T R E A M</small>
        </div>
        <div class="total">
            <i class="fa-regular fa-film"></i> <span id="totalCount">0</span> Video
        </div>
    </div>

    <div class="video-grid" id="videoGrid"></div>

    <script>
        // ==========================================================
        // 📦 DATA VIDEO - EDIT DI SINI!
        // Ganti URL dengan link Videy Anda
        // ==========================================================
        let videos = [
            {
                id: 1,
                title: "mawar pake botol parfum",
                thumbnail: "https://raw.githubusercontent.com/ramadhani01/vidoyy/refs/heads/main/thumbnails/botol.png",
                url: "https://videy.co/v/?id=Mw7DIZwg1"
            },
            {
                id: 2,
                title: "lagi vcs",
                thumbnail: "https://raw.githubusercontent.com/ramadhani01/vidoyy/refs/heads/main/thumbnails/Screenshot_20260627-134730.jpg",
                url: "https://videy.co/v/?id=sZockiYd1"
            },
            {
                id: 3,
                title: "main lidah",
                thumbnail: "https://raw.githubusercontent.com/ramadhani01/vidoyy/refs/heads/main/thumbnails/Screenshot_20260627-134305.jpg",
                url: "https://videy.co/v/?id=TXk0bCC41"
            },
            {
                id: 4,
                title: "clmk 4 jari",
                thumbnail: "https://raw.githubusercontent.com/ramadhani01/vidoyy/refs/heads/main/thumbnails/Screenshot_20260627-134512.jpg",
                url: "https://videy.co/v/?id=xr8JWPOG1"
            }
        ];

        // ==========================================================
        // 🎬 RENDER
        // ==========================================================
        function renderVideos() {
            const grid = document.getElementById('videoGrid');

            if (videos.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-folder-open"></i>
                        <h2>Belum Ada Video</h2>
                        <p>Tambahkan data di array <strong>videos</strong></p>
                    </div>
                `;
                document.getElementById('totalCount').textContent = '0';
                return;
            }

            grid.innerHTML = videos.map(v => `
                <a class="video-card" href="${v.url}" target="_blank" rel="noopener noreferrer">
                    <div class="thumb">
                        <img src="${v.thumbnail}" alt="${v.title}" 
                             loading="lazy"
                             onerror="this.src='https://via.placeholder.com/300x170/222/f59b00?text=No+Image'">
                        <div class="play-icon">
                            <i class="fa-solid fa-circle-play"></i>
                        </div>
                    </div>
                    <div class="info">
                        <h3 title="${v.title}">${v.title}</h3>
                    </div>
                </a>
            `).join('');

            document.getElementById('totalCount').textContent = videos.length;
        }

        // ==========================================================
        // 🚀 START
        // ==========================================================
        renderVideos();

        console.log('🎬 Vidoy Stream siap!');
        console.log(`📹 Total: ${videos.length} video`);
        console.log('💡 Klik thumbnail → buka link Videy di tab baru');
    </script>

</body>
</html>
